name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          name: 时光清单 ${{ github.ref_name }}
          body: |
            ## 时光清单 ${{ github.ref_name }}

            ### 下载安装
            点击下方 `.exe` 文件下载后双击安装即可。

            > Windows 可能提示"未知发布者"，点击"仍要运行"继续安装。
